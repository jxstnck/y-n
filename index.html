        <!-- 1. The counter display inside your body -->
        <div id="counter-container" style="text-align: center; font-size: 5rem;">
        Nick e Yaya stanno insieme da:<br> 
        <span id="countup-timer">Caricamento...</span>
        </div>

    <!-- 2. The JavaScript logic right below it -->
    <script>
    // Set the target past date (December 26, 2025 - Month is 11 because January is 0)
    const startDate = new Date(2025, 11, 26, 0, 0, 0);

    function updateCounter() {
        const now = new Date();
        const difference = now - startDate; // Difference in milliseconds

        // Calculate time units
        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        // Display the result in the HTML element
        document.getElementById('countup-timer').innerHTML = 
            `${days} giorni, ${hours} ore, ${minutes} minuti e ${seconds} secondi`;
    }

    // Run the function immediately when the page loads
    updateCounter();

    // Update the counter every single second (1000 milliseconds)
    setInterval(updateCounter, 1000);
    </script>
